name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: retrieve-core/pyproject.toml

      - name: Install Python dependencies
        run: python -m pip install -e "./retrieve-core[dev,graphrag,lightrag]"

      - name: Lint Python
        working-directory: retrieve-core
        run: python -m ruff check src tests ../scripts

      - name: Run Python tests
        working-directory: retrieve-core
        run: python -m pytest tests -x --tb=short -q

      - name: Audit Python dependencies
        if: matrix.python-version == '3.12'
        run: |
          python -m pip install pip-audit==2.10.1
          python -m pip_audit --ignore-vuln PYSEC-2026-113

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Lint frontend
        run: npm run lint

      - name: Check Svelte types
        run: npm run check

      - name: Run Vitest
        run: npm run test:unit -- --run

      - name: Build frontend
        run: npm run build

  iac:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pinned Bicep
        run: |
          az version
          az bicep install --version v0.44.1
          test "$(az bicep version --only-show-errors | grep -o '0.44.1')" = "0.44.1"

      - name: Validate infrastructure-only Bicep
        run: |
          az bicep lint --file infra/main.bicep
          az bicep build --file infra/main.bicep --outfile "$RUNNER_TEMP/retrieve-main.json"
          test "$(grep -c 'Microsoft.App/containerApps' "$RUNNER_TEMP/retrieve-main.json" || true)" = "0"
          test "$(grep -c 'Microsoft.App/jobs' "$RUNNER_TEMP/retrieve-main.json")" = "1"

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend, iac]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build GraphRAG job image
        run: |
          cp -R retrieve-core/tests/fixtures/ci-corpus corpus
          docker build -f retrieve-core/Dockerfile.graphrag-job -t retrieve-graphrag:${{ github.sha }} .

      - name: Inspect GraphRAG job image
        run: |
          test "$(docker run --rm --entrypoint id retrieve-graphrag:${{ github.sha }} -u)" != "0"
          docker run --rm --entrypoint python retrieve-graphrag:${{ github.sha }} -c "import graphrag; import retrieve.graphrag_worker.run_job"
