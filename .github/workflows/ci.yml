name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: retrieve-core/pyproject.toml

      - name: Install Python dependencies
        run: python -m pip install -e "./retrieve-core[dev]"

      # Transitional correctness gate. Plan 2 tracks the existing full-Ruff
      # style/import backlog; fatal syntax/name errors remain blocking here.
      - name: Check Python correctness
        working-directory: retrieve-core
        run: python -m ruff check src tests --select E9,F63,F7,F82

      - name: Run Python tests
        working-directory: retrieve-core
        run: python -m pytest tests -x --tb=short -q

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Check Svelte types
        run: npm run check

      - name: Run Vitest
        run: npm run test:unit -- --run

      - name: Build frontend
        run: npm run build

  iac:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify Azure CLI and Bicep
        run: |
          az version
          az bicep version

      - name: Validate Bicep templates
        run: az bicep build --file retrieve-core/src/retrieve/provision/bicep/main.bicep

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend, iac]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t retrieve:${{ github.sha }} .

      - name: Test Docker image starts
        run: |
          docker run --rm -d --name retrieve-test -p 8000:8000 retrieve:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/api/health || exit 1
          docker stop retrieve-test
