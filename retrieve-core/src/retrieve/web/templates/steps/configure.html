<div x-data='configureStep({{ {
  "mode": selected_mode,
  "selectedArchitectures": selected_architectures,
  "selectedEmbedding": selected_embedding,
  "selectedSotaPath": selected_sota_path,
  "sotaToggles": sota_toggles,
  "architectures": all_architectures,
  "embeddingModels": embedding_models,
  "sotaPaths": sota_paths,
} | tojson }})'>

  <!-- Test Mode UI -->
  <template x-if="mode === 'test'">
    <div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">Architectures to Compare</div>
          <span class="badge badge-blue">Test Mode</span>
        </div>
        <p class="text-muted mb-2">
          Pick the architectures you want to provision and evaluate.
          Cost / accuracy / latency are <em>directional</em> — measured scores will replace these.
        </p>
        <table class="gh-table">
          <thead>
            <tr>
              <th style="width:40px;"></th>
              <th>Architecture</th>
              <th>Accuracy</th>
              <th>Cost</th>
              <th>Latency</th>
              <th class="num">Est $/mo</th>
              <th>Best for</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="(arch, key) in architectures" :key="key">
              <tr :class="{ 'row-selected': selectedArchitectures.includes(key) }"
                  @click="toggleArch(key)" style="cursor:pointer;">
                <td><input type="checkbox" :checked="selectedArchitectures.includes(key)"
                           @click.stop="toggleArch(key)"></td>
                <td>
                  <strong x-text="arch.name"></strong>
                  <div class="text-muted text-sm" x-text="arch.description || ''"></div>
                </td>
                <td x-text="arch.accuracy"></td>
                <td x-text="arch.cost"></td>
                <td x-text="arch.latency"></td>
                <td class="num" x-text="arch.est_monthly_usd ? '$' + arch.est_monthly_usd : '—'"></td>
                <td class="text-sm" x-text="arch.best_for"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">Embedding Model</div>
          <span class="badge badge-gray">For vector-based architectures</span>
        </div>
        <table class="gh-table">
          <thead>
            <tr>
              <th style="width:40px;"></th>
              <th>Model</th>
              <th>Dimensions</th>
              <th>MTEB Avg</th>
              <th>Cost / 1M</th>
              <th>Latency p50</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="(model, key) in embeddingModels" :key="key">
              <tr :class="{ 'row-selected': selectedEmbedding === key }"
                  @click="selectedEmbedding = key" style="cursor:pointer;">
                <td><input type="radio" name="embedding" :checked="selectedEmbedding === key"
                           @click.stop="selectedEmbedding = key"></td>
                <td><strong x-text="model.name"></strong></td>
                <td x-text="model.dimensions"></td>
                <td x-text="model.mteb_avg"></td>
                <td x-text="model.cost_per_1m"></td>
                <td x-text="model.latency_p50"></td>
                <td class="text-sm text-muted" x-text="model.notes"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>
  </template>

  <!-- SOTA Eval Mode UI -->
  <template x-if="mode === 'sota'">
    <div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">SOTA Path</div>
          <span class="badge badge-blue">SOTA Eval Mode</span>
        </div>
        <p class="text-muted mb-2">Choose a recommended retrieval pipeline for your use case.</p>
        <div class="sota-path-list">
          <template x-for="(path, key) in sotaPaths" :key="key">
            <div class="sota-path-card"
                 :class="{ 'sota-path-selected': selectedSotaPath === key }"
                 @click="selectSotaPath(key)" role="button" tabindex="0">
              <div class="flex items-center justify-between mb-1">
                <strong x-text="path.name"></strong>
                <span class="badge badge-gray" x-text="path.base_architecture"></span>
              </div>
              <p class="text-sm text-muted" x-text="path.description"></p>
            </div>
          </template>
        </div>
      </div>

      <template x-if="selectedSotaPath && sotaPaths[selectedSotaPath]">
        <div class="card">
          <div class="card-header">
            <div class="card-title">Component Toggles</div>
            <span class="badge badge-gray" x-text="sotaPaths[selectedSotaPath].name"></span>
          </div>
          <p class="text-muted mb-2">
            Select one option per component for a single eval run, or check multiple options to expand a matrix
            (cartesian product = N parallel eval runs).
          </p>
          <table class="gh-table">
            <thead>
              <tr>
                <th>Component</th>
                <th>Selected variants</th>
                <th>Description</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="comp in sotaPaths[selectedSotaPath].components" :key="comp.name">
                <tr>
                  <td><strong x-text="comp.name"></strong></td>
                  <td>
                    <div class="flex flex-wrap gap-2">
                      <template x-for="opt in comp.options" :key="opt">
                        <label class="text-sm" style="display:inline-flex; align-items:center; gap:4px;">
                          <input type="checkbox"
                                 :checked="isMatrixOpt(comp.name, opt)"
                                 @change="toggleMatrixOpt(comp.name, opt, comp.default)" />
                          <span x-text="opt"></span>
                        </label>
                      </template>
                    </div>
                  </td>
                  <td class="text-sm text-muted" x-text="comp.description"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <p class="text-sm mt-2">
            <strong x-text="variantCount()"></strong> variant<span x-text="variantCount() === 1 ? '' : 's'"></span>
            will be evaluated.
          </p>
        </div>
      </template>
    </div>
  </template>

  <!-- No mode picked yet -->
  <template x-if="!mode">
    <div class="card">
      <div class="alert alert-info">
        Pick a mode in <a href="/step/mode"
            hx-get="/step/mode" hx-target="#content-shell" hx-swap="innerHTML transition:true"
            hx-push-url="true">Step 3 — Mode Selection</a> first.
      </div>
    </div>
  </template>

  <div class="card" x-show="mode">
    <div class="flex items-center gap-3">
      <button class="btn btn-primary" @click="save()">Save Configuration</button>
      <span class="text-muted text-sm" x-text="status"></span>
    </div>
  </div>

  <div class="step-footer">
    <a class="btn btn-default" href="/step/mode"
       hx-get="/step/mode" hx-target="#content-shell" hx-swap="innerHTML transition:true" hx-push-url="true">Back</a>
    <a class="btn btn-primary" href="/step/provision"
       hx-get="/step/provision" hx-target="#content-shell" hx-swap="innerHTML transition:true" hx-push-url="true">Next: Provision</a>
  </div>
</div>

<style>
.row-selected { background: var(--color-accent-subtle); }
.sota-path-list { display: grid; gap: 10px; }
.sota-path-card {
  border: 1px solid var(--color-border-default);
  border-radius: 8px;
  padding: 12px 14px;
  background: var(--color-canvas-subtle);
  cursor: pointer;
}
.sota-path-card:hover { border-color: var(--color-accent-emphasis); }
.sota-path-selected {
  border-color: var(--color-accent-emphasis) !important;
  background: var(--color-canvas-default);
  box-shadow: 0 0 0 1px var(--color-accent-emphasis) inset;
}
.form-select {
  background: var(--color-canvas-default);
  color: var(--color-fg-default);
  border: 1px solid var(--color-border-default);
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 13px;
}
</style>

<script>
function configureStep(initial) {
  return {
    mode: initial.mode || '',
    architectures: initial.architectures || {},
    embeddingModels: initial.embeddingModels || {},
    sotaPaths: initial.sotaPaths || {},
    selectedArchitectures: Array.isArray(initial.selectedArchitectures) ? initial.selectedArchitectures : [],
    selectedEmbedding: initial.selectedEmbedding || 'text-embedding-3-large',
    selectedSotaPath: initial.selectedSotaPath || '',
    sotaToggles: initial.sotaToggles || {},
    status: '',
    toggleArch(key) {
      const i = this.selectedArchitectures.indexOf(key);
      if (i >= 0) this.selectedArchitectures.splice(i, 1);
      else this.selectedArchitectures.push(key);
    },
    selectSotaPath(key) {
      this.selectedSotaPath = key;
      // Initialize toggles to defaults if empty. sotaToggles is now {name: [opt,...]}.
      const path = this.sotaPaths[key];
      if (path && (!this.sotaToggles || Object.keys(this.sotaToggles).length === 0)) {
        const t = {};
        for (const c of path.components) t[c.name] = [c.default];
        this.sotaToggles = t;
      } else if (path) {
        for (const c of path.components) {
          // Migrate from string → list shape if needed
          const cur = this.sotaToggles[c.name];
          if (cur === undefined || cur === null) this.sotaToggles[c.name] = [c.default];
          else if (typeof cur === 'string') this.sotaToggles[c.name] = [cur];
        }
      }
    },
    isMatrixOpt(comp, opt) {
      const arr = this.sotaToggles[comp];
      return Array.isArray(arr) && arr.includes(opt);
    },
    toggleMatrixOpt(comp, opt, defaultOpt) {
      let arr = this.sotaToggles[comp];
      if (!Array.isArray(arr)) arr = arr ? [arr] : [];
      const i = arr.indexOf(opt);
      if (i >= 0) arr.splice(i, 1);
      else arr.push(opt);
      // Don't allow zero selections — fall back to default
      if (arr.length === 0) arr = [defaultOpt];
      this.sotaToggles[comp] = arr;
    },
    variantCount() {
      const path = this.sotaPaths[this.selectedSotaPath];
      if (!path) return 0;
      let n = 1;
      for (const c of path.components) {
        const arr = this.sotaToggles[c.name];
        n *= (Array.isArray(arr) && arr.length > 0) ? arr.length : 1;
      }
      return n;
    },
    async save() {
      this.status = 'Saving...';
      const payload = this.mode === 'test'
        ? {
            selected_architectures: this.selectedArchitectures,
            selected_embedding: this.selectedEmbedding,
            configure_done: true,
          }
        : {
            selected_sota_path: this.selectedSotaPath,
            sota_toggles: this.sotaToggles,
            configure_done: true,
          };
      try {
        const r = await fetch('/api/ui/session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        this.status = 'Saved ✓';
      } catch (e) {
        this.status = 'Failed: ' + e.message;
      }
    },
  };
}
</script>
