<!DOCTYPE html>
<html lang="en" data-color-mode="dark" data-dark-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retrieve — {{ page_title }}</title>

<!-- HTMX -->
<script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
<!-- Alpine.js -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

<style>
/* ── Reset ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Copilot-inspired tokens ─────────────────────────────── */
:root {
  --color-canvas-default:   #08061a;
  --color-canvas-subtle:    #111033;
  --color-canvas-overlay:   #171844;
  --color-border-default:   #2d2f6f;
  --color-border-muted:     #23255b;
  --color-fg-default:       #f4f7ff;
  --color-fg-muted:         #b8c1ef;
  --color-fg-subtle:        #8e97d6;
  --color-accent-fg:        #7fd8ff;
  --color-accent-emphasis:  #4f7cff;
  --color-success-fg:       #58e7b4;
  --color-success-emphasis: #1f8d67;
  --color-danger-fg:        #ff7f96;
  --color-danger-emphasis:  #9f2f54;
  --color-warning-fg:       #ffd26e;
  --color-warning-emphasis: #a06a07;
  --color-done-fg:          #ba9bff;

  --sidebar-width: 220px;
  --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
}

/* ── Base typography ─────────────────────────────────────── */
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans',
               Helvetica, Arial, sans-serif, 'Apple Color Emoji';
  font-size: 14px;
  line-height: 1.5;
  background:
    radial-gradient(72rem 28rem at 6% 10%, rgba(154, 126, 255, 0.18), transparent 60%),
    radial-gradient(56rem 24rem at 82% 12%, rgba(95, 176, 255, 0.14), transparent 62%),
    linear-gradient(125deg, #060a18 0%, #0b1222 48%, #0f1828 100%);
  color: var(--color-fg-default);
  display: flex;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

a::selection,
::selection { background: rgba(129, 186, 255, 0.4); color: #ffffff; }

a { color: #8fd2ff; text-decoration: none; }
a:hover { text-decoration: underline; }

code, pre {
  font-family: var(--font-mono);
  font-size: 12px;
}

/* ── Sidebar ─────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-width);
  min-height: 100vh;
  background: linear-gradient(180deg, rgba(18, 16, 56, 0.92) 0%, rgba(14, 13, 44, 0.95) 100%);
  border-right: 1px solid rgba(112, 123, 255, 0.35);
  box-shadow: 0 0 0 1px rgba(90, 106, 255, 0.12) inset;
  backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 16px 16px 14px;
  border-bottom: 1px solid var(--color-border-default);
  color: var(--color-fg-default);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: -0.2px;
}

.sidebar-brand-text {
  white-space: nowrap;
}

.sidebar-brand-icons {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.sidebar-brand-sep {
  font-weight: 700;
  font-size: 12px;
  line-height: 1;
  color: rgba(234, 240, 255, 0.86);
}

.sidebar-brand-icon {
  width: 18px;
  height: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 5px;
  background: rgba(101, 119, 255, 0.2);
  border: 1px solid rgba(146, 163, 255, 0.35);
  color: #eaf0ff;
  overflow: hidden;
}

.sidebar-brand-icon svg,
.sidebar-brand-icon img {
  width: 14px;
  height: 14px;
  display: block;
}

.sidebar-section {
  padding: 12px 8px;
  border-bottom: 1px solid var(--color-border-muted);
}

.sidebar-section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--color-fg-subtle);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0 8px 8px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 8px;
  border-radius: 6px;
  color: var(--color-fg-muted);
  cursor: pointer;
  text-decoration: none;
  transition: background 0.1s, color 0.1s;
  font-size: 13px;
  line-height: 1.3;
  position: relative;
}

.sidebar-item:hover {
  background: rgba(122, 142, 255, 0.18);
  color: var(--color-fg-default);
  text-decoration: none;
}

.sidebar-item.active {
  background: linear-gradient(90deg, #5a62ff 0%, #4ac6ff 100%);
  color: #fff;
  font-weight: 500;
  box-shadow: 0 8px 22px rgba(76, 128, 255, 0.35);
}

.sidebar-item.active .step-circle { background: rgba(255,255,255,0.25); color: #fff; border-color: transparent; }

/* Step status circles */
.step-circle {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--color-border-default);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
  transition: background 0.2s, border-color 0.2s;
}

.step-circle.done     { background: var(--color-success-emphasis); border-color: var(--color-success-fg); color: #fff; }
.step-circle.active   { background: var(--color-accent-emphasis);  border-color: var(--color-accent-fg);  color: #fff; }
.step-circle.error    { background: var(--color-danger-emphasis);  border-color: var(--color-danger-fg);  color: #fff; }
.step-circle.pending  { background: transparent; border-color: var(--color-border-default); color: var(--color-fg-subtle); }

.sidebar-bottom {
  margin-top: auto;
  padding: 8px;
  border-top: 1px solid var(--color-border-muted);
}

/* ── Main content ────────────────────────────────────────── */
.main-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.main-header {
  padding: 20px 28px 0;
  border-bottom: 1px solid rgba(113, 120, 221, 0.35);
  background: linear-gradient(180deg, rgba(13, 22, 46, 0.74), rgba(10, 17, 34, 0.52));
}

.main-header h1 {
  font-size: 20px;
  font-weight: 600;
  color: var(--color-fg-default);
  margin-bottom: 4px;
}

.main-header .subtitle {
  font-size: 13px;
  color: var(--color-fg-muted);
  margin-bottom: 16px;
}

.step-breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--color-fg-muted);
  margin-bottom: 12px;
}

.step-breadcrumb .crumb-active { color: var(--color-fg-default); font-weight: 500; }

#main {
  padding: 24px 28px;
  flex: 1;
}

/* ── GitHub-style cards ──────────────────────────────────── */
.card {
  background: linear-gradient(180deg, rgba(20, 29, 54, 0.85) 0%, rgba(16, 24, 44, 0.9) 100%);
  border: 1px solid rgba(105, 127, 196, 0.38);
  border-radius: 6px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 10px 28px rgba(7, 11, 22, 0.32), 0 0 0 1px rgba(131, 154, 221, 0.08) inset;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--color-fg-default);
}

.card-muted { color: var(--color-fg-muted); font-size: 13px; }

/* ── Buttons ─────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 16px;
  font-size: 14px;
  font-weight: 500;
  line-height: 20px;
  border-radius: 6px;
  border: 1px solid;
  cursor: pointer;
  transition: background 0.1s, border-color 0.1s, color 0.1s;
  text-decoration: none;
  white-space: nowrap;
  font-family: inherit;
}

.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-primary {
  background: linear-gradient(90deg, #5d6dff 0%, #4ed0ff 100%);
  border-color: rgba(178, 214, 255, 0.55);
  color: #fff;
}
.btn-primary:hover:not(:disabled) {
  background: linear-gradient(90deg, #6674ff 0%, #58d6ff 100%);
  box-shadow: 0 8px 24px rgba(84, 143, 255, 0.45);
}

.btn-default {
  background: rgba(34, 35, 86, 0.9);
  border-color: rgba(113, 120, 221, 0.45);
  color: var(--color-fg-default);
}
.btn-default:hover:not(:disabled) { background: rgba(51, 53, 117, 0.9); }

.btn-danger {
  background: transparent;
  border-color: var(--color-border-default);
  color: var(--color-danger-fg);
}
.btn-danger:hover:not(:disabled) { background: var(--color-danger-emphasis); border-color: var(--color-danger-fg); color: #fff; }

.btn-sm { padding: 3px 12px; font-size: 12px; line-height: 18px; }

/* ── Forms ───────────────────────────────────────────────── */
.form-group { margin-bottom: 16px; }

label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--color-fg-default);
  margin-bottom: 6px;
}

.label-optional {
  font-weight: 400;
  color: var(--color-fg-muted);
  font-size: 12px;
  margin-left: 4px;
}

input[type="text"],
input[type="number"],
input[type="range"],
select,
textarea {
  width: 100%;
  padding: 5px 12px;
  font-size: 14px;
  font-family: inherit;
  background: rgba(10, 16, 33, 0.85);
  color: var(--color-fg-default);
  border: 1px solid rgba(113, 141, 209, 0.36);
  border-radius: 6px;
  transition: border-color 0.1s, box-shadow 0.1s;
  outline: none;
}

input:focus, select:focus, textarea:focus {
  border-color: var(--color-accent-fg);
  box-shadow: 0 0 0 3px rgba(99, 142, 255, 0.28);
}

input[type="range"] { padding: 0; cursor: pointer; accent-color: var(--color-accent-fg); }

textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

select option { background: var(--color-canvas-overlay); }

.form-hint { font-size: 12px; color: var(--color-fg-muted); margin-top: 6px; display: block; }
.text-success { color: var(--color-success-fg) !important; }
.text-danger  { color: var(--color-danger-fg)  !important; }

/* ── Tables ──────────────────────────────────────────────── */
.gh-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.gh-table thead tr {
  background: rgba(20, 28, 52, 0.95);
}

.gh-table th {
  padding: 8px 12px;
  text-align: left;
  font-weight: 600;
  font-size: 12px;
  color: var(--color-fg-muted);
  border-bottom: 1px solid var(--color-border-default);
  white-space: nowrap;
}

.gh-table td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--color-border-muted);
  color: var(--color-fg-default);
}

.gh-table tr:last-child td { border-bottom: none; }
.gh-table tr:hover td { background: rgba(31, 45, 79, 0.8); }

.gh-table .num { text-align: right; font-variant-numeric: tabular-nums; font-family: var(--font-mono); }

/* ── Badges ──────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid transparent;
}

.badge-green  { background: rgba(26, 93, 75, 0.55); color: var(--color-success-fg); border-color: rgba(88, 231, 180, 0.35); }
.badge-blue   { background: rgba(37, 66, 141, 0.55); color: var(--color-accent-fg);  border-color: rgba(111, 203, 255, 0.4); }
.badge-yellow { background: rgba(107, 73, 12, 0.5); color: var(--color-warning-fg); border-color: rgba(255, 212, 109, 0.35); }
.badge-red    { background: rgba(125, 40, 72, 0.52); color: var(--color-danger-fg);  border-color: rgba(255, 127, 150, 0.38); }
.badge-purple { background: rgba(87, 60, 154, 0.55); color: var(--color-done-fg);    border-color: rgba(186, 155, 255, 0.4); }
.badge-gray   { background: rgba(44, 46, 98, 0.65); color: var(--color-fg-muted); border-color: rgba(126, 136, 224, 0.24); }
.badge-default { background: rgba(44, 46, 98, 0.5); color: var(--color-fg-muted); border-color: rgba(126, 136, 224, 0.22); }
tr.row-selected td { background: rgba(37, 66, 141, 0.18); }

/* ── Stats row ───────────────────────────────────────────── */
.stats-row { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 16px; }
.stat-item { display: flex; flex-direction: column; gap: 2px; }
.stat-value { font-size: 24px; font-weight: 700; color: var(--color-fg-default); font-variant-numeric: tabular-nums; }
.stat-label { font-size: 12px; color: var(--color-fg-muted); }

/* ── Log panel ───────────────────────────────────────────── */
.log-panel {
  background: rgba(9, 15, 30, 0.9);
  border: 1px solid rgba(100, 128, 198, 0.34);
  border-radius: 6px;
  overflow: hidden;
  margin-top: 16px;
}

.log-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: rgba(20, 28, 52, 0.95);
  border-bottom: 1px solid var(--color-border-muted);
  font-size: 12px;
  font-weight: 600;
  color: var(--color-fg-muted);
}

.log-panel-body {
  height: 300px;
  overflow-y: auto;
  padding: 10px 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.6;
  color: var(--color-fg-muted);
}

.log-line { padding: 1px 0; }
.log-line.success { color: var(--color-success-fg); }
.log-line.error   { color: var(--color-danger-fg); }
.log-line.info    { color: var(--color-accent-fg); }

/* ── Status dot ──────────────────────────────────────────── */
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.status-dot.running { background: var(--color-warning-fg); animation: pulse 1.2s ease-in-out infinite; }
.status-dot.done    { background: var(--color-success-fg); }
.status-dot.idle    { background: var(--color-fg-subtle); }
.status-dot.error   { background: var(--color-danger-fg); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── Step footer (Next / Back) ───────────────────────────── */
.step-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0 0;
  margin-top: 8px;
  border-top: 1px solid var(--color-border-muted);
}

/* ── Dividers ────────────────────────────────────────────── */
.section-header {
  font-size: 16px;
  font-weight: 600;
  color: var(--color-fg-default);
  margin: 20px 0 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--color-border-muted);
}

/* ── Empty state ─────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--color-fg-muted);
}

.empty-state .empty-icon {
  font-size: 32px;
  margin-bottom: 12px;
  opacity: 0.5;
}

.empty-state p { font-size: 14px; margin-bottom: 8px; }
.empty-state code {
  background: rgba(23, 24, 68, 0.82);
  border: 1px solid rgba(110, 120, 225, 0.35);
  border-radius: 4px;
  padding: 2px 6px;
}

/* ── Progress bar ────────────────────────────────────────── */
.progress-bar {
  height: 6px;
  background: var(--color-border-muted);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--color-accent-emphasis);
  border-radius: 3px;
  transition: width 0.3s ease;
}

/* ── Flash / alert ───────────────────────────────────────── */
.alert {
  padding: 12px 16px;
  border-radius: 6px;
  border: 1px solid;
  margin-bottom: 16px;
  font-size: 13px;
}
.alert-success { background: rgba(27, 88, 76, 0.6); border-color: rgba(88, 231, 180, 0.35); color: var(--color-success-fg); }
.alert-danger  { background: rgba(125, 40, 72, 0.6); border-color: rgba(255, 127, 150, 0.36); color: var(--color-danger-fg); }
.alert-info    { background: rgba(37, 66, 141, 0.58); border-color: rgba(111, 203, 255, 0.35); color: var(--color-accent-fg); }

/* ── Positive / negative delta ───────────────────────────── */
.positive { color: var(--color-success-fg); font-weight: 600; }
.negative { color: var(--color-danger-fg);  font-weight: 600; }

/* ── Utility ─────────────────────────────────────────────── */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.mt-1 { margin-top: 4px; }
.mt-2 { margin-top: 8px; }
.mt-3 { margin-top: 12px; }
.mt-4 { margin-top: 16px; }
.mb-2 { margin-bottom: 8px; }
.mb-4 { margin-bottom: 16px; }
.text-sm { font-size: 12px; }
.text-muted { color: var(--color-fg-muted); }
.font-mono { font-family: var(--font-mono); }
.font-600 { font-weight: 600; }
.w-full { width: 100%; }
.hidden { display: none !important; }
</style>
</head>

<body>
<!-- ── Sidebar ──────────────────────────────────────────── -->
{% include "partials/sidebar.html" %}

<!-- ── Main ────────────────────────────────────────────── -->
<div class="main-wrapper">
  <div id="content-shell">
    {% include "partials/content_shell.html" %}
  </div>
</div>

<script>
/* HTMX config */
htmx.config.scrollIntoViewOnBoost = false;

document.body.addEventListener('htmx:afterSwap', function (evt) {
  const title = document.getElementById('page-title')?.textContent?.trim();
  if (title) {
    document.title = `Retrieve — ${title}`;
  }

  if (evt.detail?.target?.id === 'content-shell') {
    const match = window.location.pathname.match(/\/step\/([^/]+)/);
    const activeStep = match ? match[1] : '';
    document.querySelectorAll('.sidebar-item').forEach(function (item) {
      const href = item.getAttribute('href') || '';
      item.classList.toggle('active', activeStep !== '' && href.endsWith(`/step/${activeStep}`));
    });
  }
});

/* Auto-scroll log panels */
function scrollLog(el) {
  if (el) el.scrollTop = el.scrollHeight;
}

/* Start an SSE log stream that appends lines to a log panel body */
function startSSE(url, logBodyId, doneCallback) {
  const body = document.getElementById(logBodyId);
  const dot  = body?.closest('.log-panel')?.querySelector('.status-dot');
  if (dot)  { dot.className = 'status-dot running'; }

  const src = new EventSource(url);

  src.onmessage = function(e) {
    const line = document.createElement('div');
    line.className = 'log-line';
    line.textContent = e.data;
    body.appendChild(line);
    scrollLog(body);
  };

  src.addEventListener('done', function() {
    src.close();
    if (dot) dot.className = 'status-dot done';
    if (doneCallback) doneCallback();
  });

  src.onerror = function() {
    src.close();
    if (dot) dot.className = 'status-dot error';
    const line = document.createElement('div');
    line.className = 'log-line error';
    line.textContent = '⚠ Connection lost.';
    body.appendChild(line);
    scrollLog(body);
  };

  return src;
}

async function saveUiSession(patch) {
  await fetch('/api/ui/session', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(patch || {}),
  });
}

async function startUiJob(kind, args, logBodyId, statusDotId) {
  // If the log panel doesn't exist yet (e.g. corpus files are showing), inject it
  if (!document.getElementById(logBodyId)) {
    const resultsDiv = document.getElementById(kind + '-results');
    if (resultsDiv) {
      resultsDiv.innerHTML =
        '<div class="log-panel">' +
          '<div class="log-panel-header">' +
            '<div class="flex items-center gap-2"><span id="' + statusDotId + '" class="status-dot running"></span>Live Logs</div>' +
            '<span class="text-muted">SSE</span>' +
          '</div>' +
          '<div id="' + logBodyId + '" class="log-panel-body"></div>' +
        '</div>';
    }
  }
  const body = document.getElementById(logBodyId);
  const dot = document.getElementById(statusDotId);
  if (body) body.textContent = '';
  if (dot) dot.className = 'status-dot running';

  const resp = await fetch('/api/ui/job/start', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ kind, args: args || {} }),
  });
  if (!resp.ok) {
    if (dot) dot.className = 'status-dot error';
    return;
  }

  const data = await resp.json();
  const jobId = data.job_id;
  startSSE(`/api/ui/job/${jobId}/stream`, logBodyId, async () => {
    const s = await fetch(`/api/ui/job/${jobId}/status`);
    const status = await s.json();
    if (dot) dot.className = status.error ? 'status-dot error' : 'status-dot done';
    if (status.error && body) {
      const line = document.createElement('div');
      line.className = 'log-line error';
      line.textContent = `ERROR: ${status.error}`;
      body.appendChild(line);
      scrollLog(body);
      return;  // Don't refresh — keep the error visible
    }

    // Swap just the results section if the page has one, otherwise refresh the whole step
    const resultsTarget = document.getElementById('ingest-results') || document.getElementById('eval-results');
    if (resultsTarget) {
      htmx.ajax('GET', window.location.pathname, {target: '#' + resultsTarget.id, swap: 'outerHTML', select: '#' + resultsTarget.id});
    } else {
      htmx.ajax('GET', window.location.pathname, {target: '#content-shell', swap: 'innerHTML'});
    }
  });
}
</script>
</body>
</html>
